<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>health check</title>
  <style>
    body {
      background: #0D1117;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
    }

    .terminal {
      background: #0D1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      width: 480px;
      overflow: hidden;
    }

    .bar {
      background: #161B22;
      padding: 10px 14px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid #30363d;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .screen {
      padding: 16px;
      font-size: 13px;
      line-height: 1.8;
      min-height: 160px;
    }

    .prompt { color: #1D9E75; }
    .cmd    { color: #e6edf3; }
    .key    { color: #79c0ff; }
    .val    { color: #a5d6ff; }
    .ok     { color: #1D9E75; }
    .err    { color: #ff7b72; }
    .muted  { color: #8b949e; }

    button {
      margin: 0 16px 16px;
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover { border-color: #8b949e; color: #e6edf3; }
  </style>
</head>
<body>

  <div class="terminal">
    <div class="bar">
      <div class="dot" style="background:#ff5f57"></div>
      <div class="dot" style="background:#febc2e"></div>
      <div class="dot" style="background:#28c840"></div>
    </div>
    <div class="screen" id="screen">
      <div><span class="muted">$ </span><span class="cmd">curl localhost:3000/health</span></div>
      <div id="output"><span class="muted">aguardando...</span></div>
    </div>
    <button onclick="checkHealth()">↺ executar</button>
  </div>

  <script>
    async function checkHealth() {
      const output = document.getElementById('output')
      output.innerHTML = '<span class="muted">carregando...</span>'

      try {
        const resp = await fetch('http://localhost:3000/health')
        const data = await resp.json()

        const statusClass = data.status === 'healthy' ? 'ok' : 'err'

        output.innerHTML = `
          <div><span class="muted">{</span></div>
          <div>&nbsp;&nbsp;<span class="key">"status"</span><span class="muted">: </span><span class="${statusClass}">"${data.status}"</span><span class="muted">,</span></div>
          <div>&nbsp;&nbsp;<span class="key">"uptime"</span><span class="muted">: </span><span class="val">"${data.uptime}"</span></div>
          <div>&nbsp;&nbsp;<span class="key">"timestamp"</span><span class="muted">: </span><span class="val">"${data.timestamp}"</span></div>

          <div><span class="muted">}</span></div>
        `
      } catch (e) {
        output.innerHTML = '<span class="err">erro: não foi possível conectar</span>'
      }
    }

    checkHealth()
    setInterval(checkHealth, 10000)
  </script>

</body>
</html>
